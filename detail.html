<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具详情 - AI工具集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 详情页专用样式 */
        .detail-hero {
            background: linear-gradient(135deg, #EEF2FF 0%, #FAFBFC 100%);
        }
        .icon-xl {
            width: 80px;
            height: 80px;
            font-size: 40px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tag-xl {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 500;
        }
        /* 收藏按钮 */
        .favorite-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            border: 1.5px solid #E5E7EB;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 200ms ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .favorite-btn:hover {
            border-color: #F43F5E;
            transform: scale(1.1);
        }
        .favorite-btn.active {
            background: #FEF2F2;
            border-color: #F43F5E;
        }
        .favorite-btn.active svg {
            fill: #F43F5E;
            stroke: #F43F5E;
        }
        /* 加载状态 */
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(99, 102, 241, 0.15);
            border-top-color: #6366F1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* 心跳动画 */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .heart-beat {
            animation: heartBeat 0.6s ease-in-out;
        }
    </style>
</head>
<body class="bg-[#FAFBFC] min-h-screen">

    <!-- 顶部导航栏 -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-[#E5E7EB]">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- 返回按钮 -->
                <button id="backBtn" onclick="history.back()" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-[#F7F8FA] transition-colors text-[#6B7280] hover:text-[#111827]">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span class="text-sm font-medium hidden sm:inline">返回</span>
                </button>
                
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#6366F1] rounded-lg flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-xl font-bold text-[#111827]">AI工具集</span>
                </div>

                <!-- 占位 -->
                <div class="w-16"></div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- 加载中状态 -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-32 gap-4">
            <div class="spinner"></div>
            <p class="text-[#6B7280] text-sm">加载工具详情...</p>
        </div>

        <!-- 错误状态 -->
        <div id="errorState" class="hidden flex flex-col items-center justify-center py-32 gap-4">
            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center">
                <i data-lucide="alert-circle" class="w-8 h-8 text-red-400"></i>
            </div>
            <h2 class="text-xl font-semibold text-[#111827]">工具不存在</h2>
            <p class="text-[#6B7280] text-center max-w-sm">抱歉，找不到这个工具的信息，可能已被移除。</p>
            <button onclick="history.back()" class="mt-2 px-5 py-2.5 bg-[#6366F1] hover:bg-[#4F46E5] text-white text-sm font-medium rounded-lg transition-colors">
                返回首页
            </button>
        </div>

        <!-- 详情内容 -->
        <div id="detailContent" class="hidden">
            
            <!-- Hero区域 -->
            <div class="detail-hero rounded-2xl p-8 mb-6 relative">
                <!-- 收藏按钮 -->
                <button id="favoriteBtn" class="favorite-btn absolute top-6 right-6" title="收藏">
                    <i data-lucide="heart" class="w-5 h-5 text-[#9CA3AF]"></i>
                </button>

                <!-- 工具图标 + 名称 -->
                <div class="flex items-center gap-5 mb-5">
                    <div id="toolIcon" class="icon-xl bg-white shadow-sm"></div>
                    <div>
                        <h1 id="toolName" class="text-2xl sm:text-3xl font-bold text-[#111827] mb-2"></h1>
                        <div id="categoryBadge" class="inline-flex items-center gap-1.5 text-sm text-[#6366F1] font-medium bg-white/80 px-3 py-1 rounded-full"></div>
                    </div>
                </div>

                <!-- 推荐标记 -->
                <div id="featuredBadge" class="hidden mb-4">
                    <span class="inline-flex items-center gap-1.5 bg-amber-50 text-amber-600 border border-amber-100 px-3 py-1.5 rounded-full text-sm font-semibold">
                        <i data-lucide="star" class="w-4 h-4 fill-amber-400"></i>
                        编辑推荐
                    </span>
                </div>

                <!-- 价格说明 -->
                <div id="pricingBlock" class="flex items-center gap-3 bg-white/70 rounded-xl p-4">
                    <i data-lucide="credit-card" class="w-5 h-5 text-[#6366F1]"></i>
                    <span id="pricingText" class="text-[#111827] font-medium"></span>
                </div>
            </div>

            <!-- 完整描述 -->
            <div class="bg-white rounded-xl p-6 mb-5 shadow-sm border border-[#E5E7EB]">
                <h2 class="text-base font-semibold text-[#111827] mb-3 flex items-center gap-2">
                    <i data-lucide="align-left" class="w-4 h-4 text-[#6366F1]"></i>
                    工具简介
                </h2>
                <p id="toolDescription" class="text-[#4B5563] leading-relaxed text-[15px]"></p>
            </div>

            <!-- 功能标签 -->
            <div class="bg-white rounded-xl p-6 mb-5 shadow-sm border border-[#E5E7EB]">
                <h2 class="text-base font-semibold text-[#111827] mb-4 flex items-center gap-2">
                    <i data-lucide="tags" class="w-4 h-4 text-[#6366F1]"></i>
                    标签
                </h2>
                <div id="tagsList" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- 访问按钮 -->
            <div class="mt-8 mb-6">
                <a id="visitBtn" href="#" target="_blank" rel="noopener noreferrer"
                    class="flex items-center justify-center gap-3 w-full py-4 px-6 bg-[#6366F1] hover:bg-[#4F46E5] text-white text-base font-semibold rounded-xl transition-all duration-200 shadow-lg shadow-[#6366F1]/20 hover:shadow-[#6366F1]/30 hover:-translate-y-0.5">
                    <span>访问官网</span>
                    <i data-lucide="external-link" class="w-5 h-5"></i>
                </a>
            </div>

        </div>
    </main>

    <!-- 页脚 -->
    <footer class="border-t border-[#E5E7EB] bg-white mt-16">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                    <div class="w-5 h-5 bg-[#6366F1] rounded flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-3 h-3 text-white"></i>
                    </div>
                    <span class="text-sm font-medium text-[#111827]">AI工具集</span>
                </div>
                <p class="text-sm text-[#6B7280]">© 2026 AI工具集</p>
            </div>
        </div>
    </footer>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        const FAVORITES_KEY = 'ai-tools-favorites';

        // 获取URL参数
        function getToolId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // 获取收藏列表
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]');
            } catch {
                return [];
            }
        }

        // 切换收藏状态
        function toggleFavorite(toolId) {
            const favorites = getFavorites();
            const icon = document.querySelector('#favoriteBtn i');
            const btn = document.getElementById('favoriteBtn');

            if (favorites.includes(toolId)) {
                const newFavs = favorites.filter(id => id !== toolId);
                localStorage.setItem(FAVORITES_KEY, JSON.stringify(newFavs));
                btn.classList.remove('active');
                icon.setAttribute('data-lucide', 'heart');
                icon.classList.remove('text-red-400');
                icon.classList.add('text-[#9CA3AF]');
            } else {
                favorites.push(toolId);
                localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
                btn.classList.add('active');
                icon.setAttribute('data-lucide', 'heart');
                icon.classList.add('fill-red-400', 'heart-beat');
                icon.classList.remove('text-[#9CA3AF]');
            }
            lucide.createIcons();
        }

        // 初始化收藏按钮
        function initFavoriteBtn(toolId) {
            const btn = document.getElementById('favoriteBtn');
            const icon = btn.querySelector('i');
            const favorites = getFavorites();

            if (favorites.includes(toolId)) {
                btn.classList.add('active');
                icon.setAttribute('data-lucide', 'heart');
                icon.classList.add('fill-red-400', 'text-red-400');
                icon.classList.remove('text-[#9CA3AF]');
            }

            btn.addEventListener('click', () => toggleFavorite(toolId));
            lucide.createIcons();
        }

        // 标签颜色映射
        const tagColorMap = {
            '免费': 'bg-emerald-50 text-emerald-600 border border-emerald-100',
            '付费': 'bg-amber-50 text-amber-600 border border-amber-100',
            '付费订阅': 'bg-amber-50 text-amber-600 border border-amber-100',
            '开源': 'bg-blue-50 text-blue-600 border border-blue-100',
            '国产': 'bg-purple-50 text-purple-600 border border-purple-100',
            '大厂': 'bg-indigo-50 text-indigo-600 border border-indigo-100',
            '免费+付费': 'bg-orange-50 text-orange-600 border border-orange-100',
            '国际': 'bg-sky-50 text-sky-600 border border-sky-100',
            'API': 'bg-gray-50 text-gray-600 border border-gray-200',
            '免费可商用': 'bg-teal-50 text-teal-600 border border-teal-100',
        };

        // 分类图标映射
        const categoryIconMap = {
            'chat': { icon: '🤖', bg: 'bg-emerald-50' },
            'image': { icon: '🎨', bg: 'bg-amber-50' },
            'code': { icon: '💻', bg: 'bg-blue-50' },
            'writing': { icon: '✍️', bg: 'bg-purple-50' },
            'office': { icon: '📊', bg: 'bg-gray-100' },
            'video': { icon: '🎬', bg: 'bg-red-50' },
            'audio': { icon: '🎵', bg: 'bg-pink-50' },
            'other': { icon: '🔧', bg: 'bg-gray-100' },
        };

        const categoryNameMap = {
            'chat': '💬 AI对话',
            'image': '🎨 AI绘图',
            'code': '💻 代码辅助',
            'writing': '✍️ 写作助手',
            'office': '📊 办公效率',
            'video': '🎬 视频处理',
            'audio': '🎵 音频处理',
            'other': '🔧 工具',
        };

        // 渲染详情
        function renderDetail(tool) {
            const loading = document.getElementById('loadingState');
            const error = document.getElementById('errorState');
            const content = document.getElementById('detailContent');

            loading.classList.add('hidden');
            error.classList.add('hidden');
            content.classList.remove('hidden');

            // 名称
            document.getElementById('toolName').textContent = tool.name;

            // 图标
            const catInfo = categoryIconMap[tool.category] || categoryIconMap['other'];
            const iconEl = document.getElementById('toolIcon');
            iconEl.className = `icon-xl bg-white shadow-sm ${catInfo.bg}`;
            iconEl.textContent = catInfo.icon;

            // 分类标签
            const catBadge = document.getElementById('categoryBadge');
            catBadge.innerHTML = categoryNameMap[tool.category] || tool.category || '🔧 工具';

            // 推荐标记
            if (tool.featured) {
                document.getElementById('featuredBadge').classList.remove('hidden');
            }

            // 价格
            const pricingEl = document.getElementById('pricingText');
            if (tool.pricing) {
                pricingEl.textContent = tool.pricing;
            } else {
                document.getElementById('pricingBlock').classList.add('hidden');
            }

            // 描述
            const descEl = document.getElementById('toolDescription');
            descEl.textContent = tool.description || tool.summary || '暂无详细描述。';

            // 标签
            const tagsList = document.getElementById('tagsList');
            const tags = tool.tags || [];
            if (tags.length > 0) {
                tagsList.innerHTML = tags.map(tag => {
                    const colorClass = tagColorMap[tag] || 'bg-gray-50 text-gray-600 border border-gray-200';
                    return `<span class="tag-xl ${colorClass}">${tag}</span>`;
                }).join('');
            } else {
                tagsList.innerHTML = '<span class="text-sm text-[#9CA3AF]">暂无标签</span>';
            }

            // 访问按钮
            const visitBtn = document.getElementById('visitBtn');
            if (tool.url) {
                visitBtn.href = tool.url;
            } else {
                visitBtn.href = '#';
                visitBtn.addEventListener('click', e => e.preventDefault());
            }

            // 更新页面标题
            document.title = `${tool.name} - AI工具集`;

            // 初始化收藏按钮
            initFavoriteBtn(tool.id);

            // 重新渲染图标
            lucide.createIcons();
        }

        // 显示错误
        function showError() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('detailContent').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            lucide.createIcons();
        }

        // 加载详情数据
        async function loadDetail() {
            const toolId = getToolId();
            if (!toolId) {
                showError();
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/tools/${toolId}`);
                if (!res.ok) {
                    showError();
                    return;
                }
                const data = await res.json();
                const tool = data.data;
                if (!tool) {
                    showError();
                    return;
                }
                renderDetail(tool);
            } catch (err) {
                console.error('加载详情失败:', err);
                showError();
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadDetail();
        });
    </script>
</body>
</html>
