<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交工具 - AI工具集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#FAFBFC] min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-[#E5E7EB]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#6366F1] rounded-lg flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-xl font-bold text-[#111827]">AI工具集</span>
                </div>

                <!-- 右侧操作 -->
                <div class="flex items-center gap-3">
                    <a href="index.html" class="px-4 py-2 bg-white hover:bg-[#F7F8FA] text-[#6B7280] hover:text-[#111827] text-sm font-medium rounded-lg transition-colors border border-[#E5E7EB] flex items-center gap-1.5">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        <span>返回首页</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-[#6366F1] rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="upload-cloud" class="w-7 h-7 text-white"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold text-[#111827] mb-2">提交你的 AI 工具</h1>
            <p class="text-[#6B7280]">分享优质工具，帮助更多人发现好东西。我们会尽快审核，1-3个工作日内完成</p>
        </div>

        <!-- 提交表单 -->
        <div id="formContainer" class="bg-white rounded-2xl shadow-card p-6 sm:p-8">
            <form id="submitForm" class="space-y-5">
                <!-- 工具名称 -->
                <div>
                    <label for="toolName" class="block text-sm font-medium text-[#111827] mb-1.5">
                        工具名称 <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="toolName" 
                        name="toolName"
                        placeholder="例如：ChatGPT、Midjourney"
                        class="w-full px-4 py-2.5 bg-[#F7F8FA] border border-[#E5E7EB] rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#6366F1] focus:border-transparent transition-all"
                    >
                    <p id="toolNameError" class="hidden text-red-500 text-xs mt-1">请输入工具名称</p>
                </div>

                <!-- 官网URL -->
                <div>
                    <label for="toolUrl" class="block text-sm font-medium text-[#111827] mb-1.5">
                        官网地址 <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="url" 
                        id="toolUrl" 
                        name="toolUrl"
                        placeholder="https://example.com"
                        class="w-full px-4 py-2.5 bg-[#F7F8FA] border border-[#E5E7EB] rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#6366F1] focus:border-transparent transition-all"
                    >
                    <p id="toolUrlError" class="hidden text-red-500 text-xs mt-1">请输入正确的网址（以 http:// 或 https:// 开头）</p>
                </div>

                <!-- 工具简介 -->
                <div>
                    <label for="toolDesc" class="block text-sm font-medium text-[#111827] mb-1.5">
                        工具简介
                    </label>
                    <textarea 
                        id="toolDesc" 
                        name="toolDesc"
                        rows="3"
                        placeholder="简要描述这个工具的主要功能和特点..."
                        class="w-full px-4 py-2.5 bg-[#F7F8FA] border border-[#E5E7EB] rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#6366F1] focus:border-transparent transition-all resize-none"
                    ></textarea>
                    <p class="text-xs text-[#9CA3AF] mt-1">选填，建议 50-200 字</p>
                </div>

                <!-- 分类 -->
                <div>
                    <label for="toolCategory" class="block text-sm font-medium text-[#111827] mb-1.5">
                        工具分类
                    </label>
                    <select 
                        id="toolCategory" 
                        name="toolCategory"
                        class="w-full px-4 py-2.5 bg-[#F7F8FA] border border-[#E5E7EB] rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#6366F1] focus:border-transparent transition-all cursor-pointer"
                    >
                        <option value="">请选择分类</option>
                        <option value="chat">💬 聊天AI</option>
                        <option value="image">🎨 绘图生成</option>
                        <option value="code">💻 代码辅助</option>
                        <option value="writing">✍️ 写作助手</option>
                        <option value="office">📊 办公效率</option>
                        <option value="video">🎬 视频处理</option>
                        <option value="audio">🎵 音频处理</option>
                        <option value="other">🔧 其他工具</option>
                    </select>
                </div>

                <!-- 标签 -->
                <div>
                    <label class="block text-sm font-medium text-[#111827] mb-2">
                        工具标签（可多选）
                    </label>
                    <div class="flex flex-wrap gap-2" id="tagCheckboxes">
                        <label class="tag-checkbox-label cursor-pointer">
                            <input type="checkbox" name="tags" value="免费" class="sr-only peer">
                            <span class="tag-checkbox-span px-3 py-1.5 rounded-full text-xs font-medium border border-[#E5E7EB] bg-white text-[#6B7280] peer-checked:bg-[#6366F1] peer-checked:text-white peer-checked:border-[#6366F1] transition-all">免费</span>
                        </label>
                        <label class="tag-checkbox-label cursor-pointer">
                            <input type="checkbox" name="tags" value="付费" class="sr-only peer">
                            <span class="tag-checkbox-span px-3 py-1.5 rounded-full text-xs font-medium border border-[#E5E7EB] bg-white text-[#6B7280] peer-checked:bg-[#6366F1] peer-checked:text-white peer-checked:border-[#6366F1] transition-all">付费</span>
                        </label>
                        <label class="tag-checkbox-label cursor-pointer">
                            <input type="checkbox" name="tags" value="开源" class="sr-only peer">
                            <span class="tag-checkbox-span px-3 py-1.5 rounded-full text-xs font-medium border border-[#E5E7EB] bg-white text-[#6B7280] peer-checked:bg-[#6366F1] peer-checked:text-white peer-checked:border-[#6366F1] transition-all">开源</span>
                        </label>
                        <label class="tag-checkbox-label cursor-pointer">
                            <input type="checkbox" name="tags" value="国产" class="sr-only peer">
                            <span class="tag-checkbox-span px-3 py-1.5 rounded-full text-xs font-medium border border-[#E5E7EB] bg-white text-[#6B7280] peer-checked:bg-[#6366F1] peer-checked:text-white peer-checked:border-[#6366F1] transition-all">国产</span>
                        </label>
                        <label class="tag-checkbox-label cursor-pointer">
                            <input type="checkbox" name="tags" value="API" class="sr-only peer">
                            <span class="tag-checkbox-span px-3 py-1.5 rounded-full text-xs font-medium border border-[#E5E7EB] bg-white text-[#6B7280] peer-checked:bg-[#6366F1] peer-checked:text-white peer-checked:border-[#6366F1] transition-all">支持API</span>
                        </label>
                        <label class="tag-checkbox-label cursor-pointer">
                            <input type="checkbox" name="tags" value="大厂" class="sr-only peer">
                            <span class="tag-checkbox-span px-3 py-1.5 rounded-full text-xs font-medium border border-[#E5E7EB] bg-white text-[#6B7280] peer-checked:bg-[#6366F1] peer-checked:text-white peer-checked:border-[#6366F1] transition-all">大厂出品</span>
                        </label>
                        <label class="tag-checkbox-label cursor-pointer">
                            <input type="checkbox" name="tags" value="无需注册" class="sr-only peer">
                            <span class="tag-checkbox-span px-3 py-1.5 rounded-full text-xs font-medium border border-[#E5E7EB] bg-white text-[#6B7280] peer-checked:bg-[#6366F1] peer-checked:text-white peer-checked:border-[#6366F1] transition-all">无需注册</span>
                        </label>
                        <label class="tag-checkbox-label cursor-pointer">
                            <input type="checkbox" name="tags" value="国际" class="sr-only peer">
                            <span class="tag-checkbox-span px-3 py-1.5 rounded-full text-xs font-medium border border-[#E5E7EB] bg-white text-[#6B7280] peer-checked:bg-[#6366F1] peer-checked:text-white peer-checked:border-[#6366F1] transition-all">国际工具</span>
                        </label>
                    </div>
                </div>

                <!-- 提交者邮箱 -->
                <div>
                    <label for="submitterEmail" class="block text-sm font-medium text-[#111827] mb-1.5">
                        联系方式（可选）
                    </label>
                    <input 
                        type="email" 
                        id="submitterEmail" 
                        name="submitterEmail"
                        placeholder="用于接收审核结果通知"
                        class="w-full px-4 py-2.5 bg-[#F7F8FA] border border-[#E5E7EB] rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#6366F1] focus:border-transparent transition-all"
                    >
                    <p id="emailError" class="hidden text-red-500 text-xs mt-1">请输入正确的邮箱格式</p>
                    <p class="text-xs text-[#9CA3AF] mt-1">选填，我们不会公开你的邮箱</p>
                </div>

                <!-- 提交按钮 -->
                <div class="pt-2">
                    <button 
                        type="submit" 
                        id="submitBtn"
                        class="w-full py-3 px-4 bg-[#6366F1] hover:bg-[#4F46E5] active:bg-[#4338CA] text-white text-sm font-semibold rounded-lg transition-colors duration-150 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <i data-lucide="send" class="w-4 h-4"></i>
                        <span>提交工具</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- 提交成功提示 -->
        <div id="successContainer" class="hidden">
            <div class="bg-white rounded-2xl shadow-card p-8 text-center">
                <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="check-circle" class="w-8 h-8 text-emerald-500"></i>
                </div>
                <h2 class="text-xl font-bold text-[#111827] mb-2">提交成功！🎉</h2>
                <p class="text-[#6B7280] mb-6">感谢你的推荐！我们会尽快审核，1-3个工作日内完成。</p>
                <a href="index.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-[#6366F1] hover:bg-[#4F46E5] text-white text-sm font-medium rounded-lg transition-colors">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    返回首页
                </a>
            </div>
        </div>

        <!-- 提示卡片 -->
        <div class="mt-6 p-4 bg-[#EEF2FF] rounded-xl border border-[#C7D2FE]">
            <div class="flex gap-3">
                <div class="flex-shrink-0 w-5 h-5 bg-[#6366F1] rounded-full flex items-center justify-center mt-0.5">
                    <i data-lucide="info" class="w-3 h-3 text-white"></i>
                </div>
                <div>
                    <h4 class="text-sm font-medium text-[#4338CA] mb-1">提交须知</h4>
                    <ul class="text-xs text-[#6366F1] space-y-1">
                        <li>• 提交的工具需真实存在且可正常访问</li>
                        <li>• 描述需客观真实，不得含有虚假夸大信息</li>
                        <li>• 同一工具请勿重复提交</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="border-t border-[#E5E7EB] bg-white mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 bg-[#6366F1] rounded-md flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-3 h-3 text-white"></i>
                    </div>
                    <span class="text-sm font-medium text-[#111827]">AI工具集</span>
                </div>
                <p class="text-sm text-[#6B7280]">
                    © 2026 AI工具集. 精选优质 AI 工具导航
                </p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initSubmitForm();
        });

        /**
         * 初始化提交表单
         */
        function initSubmitForm() {
            const form = document.getElementById('submitForm');
            const formContainer = document.getElementById('formContainer');
            const successContainer = document.getElementById('successContainer');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                // 表单验证
                if (!validateForm()) return;

                // 收集表单数据
                const formData = {
                    name: document.getElementById('toolName').value.trim(),
                    url: document.getElementById('toolUrl').value.trim(),
                    description: document.getElementById('toolDesc').value.trim(),
                    category: document.getElementById('toolCategory').value,
                    tags: Array.from(document.querySelectorAll('input[name="tags"]:checked')).map(cb => cb.value),
                    submitterEmail: document.getElementById('submitterEmail').value.trim(),
                    submittedAt: new Date().toISOString(),
                };

                // 保存到 localStorage（临时存储）
                const submissions = JSON.parse(localStorage.getItem('ai-tools-submissions') || '[]');
                submissions.push(formData);
                localStorage.setItem('ai-tools-submissions', JSON.stringify(submissions));

                // 显示成功提示
                formContainer.classList.add('hidden');
                successContainer.classList.remove('hidden');
                lucide.createIcons();

                // 隐藏提示卡片
                document.querySelector('.bg-\\[\\#EEF2FF\\]').classList.add('hidden');
            });

            // 实时验证
            document.getElementById('toolName').addEventListener('blur', validateToolName);
            document.getElementById('toolUrl').addEventListener('blur', validateToolUrl);
            document.getElementById('submitterEmail').addEventListener('blur', validateEmail);
        }

        /**
         * 表单验证
         */
        function validateForm() {
            const nameValid = validateToolName();
            const urlValid = validateToolUrl();
            const emailValid = validateEmail();

            return nameValid && urlValid && emailValid;
        }

        function validateToolName() {
            const input = document.getElementById('toolName');
            const error = document.getElementById('toolNameError');
            const value = input.value.trim();

            if (!value) {
                error.classList.remove('hidden');
                input.classList.add('border-red-400');
                return false;
            }

            error.classList.add('hidden');
            input.classList.remove('border-red-400');
            return true;
        }

        function validateToolUrl() {
            const input = document.getElementById('toolUrl');
            const error = document.getElementById('toolUrlError');
            const value = input.value.trim();

            const urlPattern = /^https?:\/\/.+/;
            if (!value || !urlPattern.test(value)) {
                error.classList.remove('hidden');
                input.classList.add('border-red-400');
                return false;
            }

            error.classList.add('hidden');
            input.classList.remove('border-red-400');
            return true;
        }

        function validateEmail() {
            const input = document.getElementById('submitterEmail');
            const error = document.getElementById('emailError');
            const value = input.value.trim();

            // 邮箱选填，但填写了必须格式正确
            if (value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
                error.classList.remove('hidden');
                input.classList.add('border-red-400');
                return false;
            }

            error.classList.add('hidden');
            input.classList.remove('border-red-400');
            return true;
        }
    </script>
</body>
</html>
